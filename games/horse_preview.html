<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Q版馬打者 — Canvas 預覽</title>
<style>
  body { margin:0; background:#1a1a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',sans-serif; }
  h1 { color:#fff; font-size:18px; margin-bottom:8px; }
  p  { color:#aaa; font-size:13px; margin:0 0 16px; }
  canvas { border:2px solid #444; border-radius:8px; background:#87ceeb; display:block; }
  .btns { margin-top:14px; display:flex; gap:12px; }
  button {
    padding:10px 24px; border:none; border-radius:20px; font-size:15px; cursor:pointer;
    font-weight:bold; transition:.15s;
  }
  #btnIdle  { background:#4caf50; color:#fff; }
  #btnSwing { background:#f44336; color:#fff; }
  #btnAuto  { background:#2196f3; color:#fff; }
  button:active { transform:scale(.95); }
  .info { color:#888; font-size:12px; margin-top:8px; }
</style>
</head>
<body>
<h1>🐴 Q版馬打者 — Canvas 造型預覽</h1>
<p>側背視角（面向投手）· 手持機械大砲 · TAIWAN NO.1</p>
<canvas id="cv" width="360" height="400"></canvas>
<div class="btns">
  <button id="btnIdle">待機 Idle</button>
  <button id="btnSwing">揮棒 Swing!</button>
  <button id="btnAuto">自動播放</button>
</div>
<div class="info">可按按鈕切換動作 / 自動播放會循環示範完整揮棒動畫</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// ── 動畫狀態 ──────────────────────────────
let swingPhase = 0;   // 0 = idle, 0.45 = 揮棒起始, 倒數歸 0
let autoMode   = false;
let autoState  = 'idle'; // idle | swing | wait
let autoTimer  = 0;
let ts         = 0;

// ── 色彩常數 ──────────────────────────────
const C = {
  skin:    '#f5d5a0',  // 馬膚色（淡駝）
  skinDk:  '#d4a96a',  // 陰影
  muzzle:  '#e8c080',  // 口鼻
  eye:     '#1a1a1a',
  eyeW:    '#ffffff',
  hat:     '#1a3a6b',  // 深藍棒球帽
  hatBrim: '#14306b',
  shirt:   '#f8f8ff',  // 白底條紋球衣
  stripe:  '#1a3a6b',  // 藍條
  pants:   '#1a3a6b',
  shoes:   '#3a2a1a',
  cannon:  '#8b8b7a',  // 大砲主體（鐵灰）
  cannonDk:'#5a5a4a',
  brass:   '#d4a017',  // 黃銅環
  barrel:  '#6b6b5a',
  smoke:   'rgba(200,200,200,0.6)',
  tw:      '#cc2929',  // TW NO.1 紅字
};

// ── 主繪圖函式 ────────────────────────────
function draw(phase, t) {
  ctx.clearRect(0, 0, W, H);
  drawGround(ctx);
  drawBatter(ctx, phase, t);
}

function drawGround(ctx) {
  // 草地
  const grd = ctx.createLinearGradient(0, H-60, 0, H);
  grd.addColorStop(0, '#5aaa55');
  grd.addColorStop(1, '#3d7a38');
  ctx.fillStyle = grd;
  ctx.fillRect(0, H-60, W, 60);
  // 壘板標記
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(W/2-24, H-56, 48, 10);
}

function drawBatter(ctx, swingPhase, t) {
  // 座標基準：腳底中心
  const cx = 200;       // 角色水平中心（稍偏右，面向左）
  const cy = H - 62;    // 腳底 Y

  // idle 輕微呼吸 bob
  const bob = swingPhase > 0 ? 0 : Math.sin(t * 0.003) * 2.5;

  // 揮棒進度 f: 1.0=揮棒開始 → 0=結束
  const f = swingPhase / 0.45;
  // 大砲角度：idle=0.75rad(≈43°仰角) → 揮棒時弧線 3.2*f-2.0
  const cannonAng = swingPhase > 0 ? (3.2 * f - 2.0) : 0.75;

  ctx.save();
  ctx.translate(cx, cy + bob);

  // 1. 腳 / 鞋
  drawLegs(ctx, f);
  // 2. 身體（球衣）
  drawBody(ctx, f);
  // 3. 大砲（在手臂之前繪，讓手壓住）
  drawCannon(ctx, cannonAng, swingPhase, t);
  // 4. 手臂
  drawArms(ctx, cannonAng, f);
  // 5. 頭部（最上層）
  drawHead(ctx, f);

  ctx.restore();

  // 揮棒特效：炮口火花
  if (swingPhase > 0 && swingPhase < 0.12) {
    const intensity = 1 - swingPhase / 0.12;
    drawMuzzleFlash(ctx, cx, cy + bob, cannonAng, intensity);
  }
}

// ── 腳 ────────────────────────────────────
function drawLegs(ctx, f) {
  const spread = f > 0 ? 8 + f * 5 : 8; // 揮棒時腳稍微張開
  // 左腳（遠側，後）
  ctx.fillStyle = C.pants;
  ctx.beginPath();
  ctx.roundRect(-spread - 4, -70, 16, 40, 3);
  ctx.fill();
  // 右腳（近側，前）
  ctx.beginPath();
  ctx.roundRect(spread - 10, -70, 16, 40, 3);
  ctx.fill();
  // 鞋
  ctx.fillStyle = C.shoes;
  ctx.beginPath(); ctx.ellipse(-spread+2,  -32, 12, 6, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(spread+0,   -32, 12, 6,  0.1, 0, Math.PI*2); ctx.fill();
}

// ── 身體 ──────────────────────────────────
function drawBody(ctx, f) {
  // 主體（白球衣）
  ctx.fillStyle = C.shirt;
  ctx.beginPath();
  ctx.roundRect(-22, -130, 44, 62, 6);
  ctx.fill();
  // 藍色條紋（3 條）
  ctx.fillStyle = C.stripe;
  ctx.globalAlpha = 0.18;
  for (let i = 0; i < 3; i++) {
    ctx.fillRect(-22 + 8 + i * 12, -130, 3, 62);
  }
  ctx.globalAlpha = 1;
  // 衣領
  ctx.fillStyle = C.hat;
  ctx.beginPath();
  ctx.moveTo(-8, -130); ctx.lineTo(8, -130); ctx.lineTo(4, -118); ctx.lineTo(-4, -118);
  ctx.closePath(); ctx.fill();
  // 號碼「1」在背後
  ctx.fillStyle = C.hat;
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('1', 0, -88);
  // 褲子
  ctx.fillStyle = C.pants;
  ctx.beginPath();
  ctx.roundRect(-20, -72, 40, 14, 3);
  ctx.fill();
}

// ── 大砲 ──────────────────────────────────
function drawCannon(ctx, ang, phase, t) {
  // 砲管軸心：大約在胸口前方（左手位置）
  const pivX = -18;
  const pivY = -105;

  ctx.save();
  ctx.translate(pivX, pivY);
  ctx.rotate(ang);

  const barrelLen = 78;
  const barrelR   = 9;

  // 砲管主體（深灰金屬）
  const grd = ctx.createLinearGradient(0, -barrelR, 0, barrelR);
  grd.addColorStop(0, '#aaa89a');
  grd.addColorStop(0.4, C.cannon);
  grd.addColorStop(1, C.cannonDk);
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.roundRect(0, -barrelR, barrelLen, barrelR * 2, 3);
  ctx.fill();

  // 黃銅裝飾環（3個）
  ctx.fillStyle = C.brass;
  [18, 38, 58].forEach(x => {
    ctx.beginPath();
    ctx.rect(x, -barrelR - 2, 6, barrelR * 2 + 4);
    ctx.fill();
  });

  // TAIWAN NO.1 文字（弧）
  ctx.save();
  ctx.translate(barrelLen / 2, 0);
  ctx.fillStyle = C.tw;
  ctx.font      = 'bold 7px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('TAIWAN NO.1', 0, 3);
  ctx.restore();

  // 炮口擴口
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.ellipse(barrelLen, 0, barrelR + 3, barrelR + 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(barrelLen, 0, barrelR, barrelR, 0, 0, Math.PI * 2);
  ctx.fill();

  // 砲身（後段圓筒）
  const drumR = 13;
  const drumGrd = ctx.createRadialGradient(-drumR*0.3, -drumR*0.4, 2, 0, 0, drumR);
  drumGrd.addColorStop(0, '#c0bba8');
  drumGrd.addColorStop(1, C.cannonDk);
  ctx.fillStyle = drumGrd;
  ctx.beginPath();
  ctx.arc(-drumR*0.2, 0, drumR, 0, Math.PI * 2);
  ctx.fill();
  // 輪廓
  ctx.strokeStyle = '#3a3a2a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 小螺栓
  ctx.fillStyle = C.brass;
  [[10, -barrelR+2],[10, barrelR-2],[barrelLen-10, -barrelR+2],[barrelLen-10, barrelR-2]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI*2); ctx.fill();
  });

  ctx.restore();
}

// ── 手臂 ──────────────────────────────────
function drawArms(ctx, cannonAng, f) {
  const armColor = C.skin;
  const sleeveColor = C.shirt;

  // 後手（左手 — 握砲尾）
  ctx.save();
  ctx.translate(-18, -105);
  ctx.rotate(cannonAng);
  ctx.fillStyle = sleeveColor;
  ctx.beginPath(); ctx.roundRect(0, -8, 20, 16, 6); ctx.fill();
  ctx.fillStyle = armColor;
  ctx.beginPath(); ctx.arc(22, 0, 8, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // 前手（右手 — 握砲管中段）
  ctx.save();
  ctx.translate(-18, -105);
  ctx.rotate(cannonAng);
  ctx.fillStyle = sleeveColor;
  ctx.beginPath(); ctx.roundRect(36, -8, 20, 16, 6); ctx.fill();
  ctx.fillStyle = armColor;
  ctx.beginPath(); ctx.arc(58, 0, 8, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ── 頭部 ──────────────────────────────────
function drawHead(ctx, f) {
  const hx = 0, hy = -168;

  // 帽子（最底層）
  ctx.fillStyle = C.hat;
  ctx.beginPath();
  ctx.ellipse(hx, hy - 6, 26, 10, 0, Math.PI, 0); // 帽頂弧
  ctx.fill();
  // 帽簷（向左＝面向投手方向）
  ctx.beginPath();
  ctx.ellipse(hx - 28, hy + 2, 14, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // "TW" 字樣（帽前）
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('TW', hx - 12, hy - 2);

  // 頭（大圓 Q版）
  ctx.fillStyle = C.skin;
  ctx.beginPath();
  ctx.arc(hx, hy, 24, 0, Math.PI * 2);
  ctx.fill();

  // 馬鬃（頸背）
  ctx.fillStyle = '#8B5E3C';
  ctx.beginPath();
  ctx.moveTo(hx + 18, hy - 12);
  for (let i = 0; i < 6; i++) {
    ctx.quadraticCurveTo(hx + 28 + i*2, hy - 4 + i*4, hx + 18 + i*2, hy + 4 + i*5);
  }
  ctx.lineTo(hx + 14, hy + 20);
  ctx.closePath();
  ctx.fill();

  // 馬耳（三角）
  ctx.fillStyle = C.skin;
  ctx.beginPath();
  ctx.moveTo(hx + 8, hy - 22);
  ctx.lineTo(hx + 2, hy - 38);
  ctx.lineTo(hx + 16, hy - 26);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = C.skinDk;
  ctx.beginPath();
  ctx.moveTo(hx + 9, hy - 24);
  ctx.lineTo(hx + 5, hy - 33);
  ctx.lineTo(hx + 14, hy - 26);
  ctx.closePath(); ctx.fill();

  // 口鼻（馬的特徵）
  ctx.fillStyle = C.muzzle;
  ctx.beginPath();
  ctx.ellipse(hx - 12, hy + 10, 12, 9, -0.15, 0, Math.PI * 2);
  ctx.fill();
  // 鼻孔
  ctx.fillStyle = C.skinDk;
  ctx.beginPath(); ctx.ellipse(hx - 17, hy + 9, 3, 2, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx - 8,  hy + 12, 3, 2,  0.2, 0, Math.PI * 2); ctx.fill();

  // 眼睛（大Q版眼）
  ctx.fillStyle = C.eyeW;
  ctx.beginPath(); ctx.ellipse(hx - 6, hy - 4, 8, 9, 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#4a90d9'; // 藍色虹膜
  ctx.beginPath(); ctx.ellipse(hx - 7, hy - 3, 6, 7, 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = C.eye;
  ctx.beginPath(); ctx.ellipse(hx - 8, hy - 2, 4, 5, 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(hx - 6, hy - 5, 1.5, 0, Math.PI * 2); ctx.fill();

  // 笑容（小弧線）
  ctx.strokeStyle = C.skinDk;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(hx - 10, hy + 12, 5, 0.2, Math.PI - 0.2);
  ctx.stroke();
}

// ── 炮口火花 ──────────────────────────────
function drawMuzzleFlash(ctx, cx, cy, ang, intensity) {
  const pivX = cx - 18;
  const pivY = cy - 105 - (swingPhase > 0 ? 0 : Math.sin(ts * 0.003) * 2.5); // approx
  const barrelLen = 78;

  const ex = pivX + Math.cos(ang) * barrelLen;
  const ey = pivY + Math.sin(ang) * barrelLen;

  ctx.save();
  ctx.globalAlpha = intensity;
  // 外光暈
  const grd = ctx.createRadialGradient(ex, ey, 0, ex, ey, 30 * intensity);
  grd.addColorStop(0,   'rgba(255,220,80,0.9)');
  grd.addColorStop(0.4, 'rgba(255,100,20,0.6)');
  grd.addColorStop(1,   'rgba(255,50,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(ex, ey, 30 * intensity, 0, Math.PI * 2); ctx.fill();
  // 中心白點
  ctx.globalAlpha = intensity;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex, ey, 6 * intensity, 0, Math.PI * 2); ctx.fill();
  // 火焰粒子
  ctx.globalAlpha = intensity * 0.8;
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + ang;
    const r = 14 + Math.random() * 10;
    ctx.fillStyle = i % 2 ? '#ffd700' : '#ff4500';
    ctx.beginPath();
    ctx.arc(ex + Math.cos(a)*r*intensity, ey + Math.sin(a)*r*intensity, 3*intensity, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// ── 動畫迴圈 ──────────────────────────────
function loop(t) {
  ts = t;
  if (autoMode) {
    if (autoState === 'idle') {
      autoTimer -= 16;
      if (autoTimer <= 0) {
        autoState = 'swing';
        swingPhase = 0.45;
      }
    } else if (autoState === 'swing') {
      swingPhase -= 0.008;
      if (swingPhase <= 0) {
        swingPhase = 0;
        autoState  = 'wait';
        autoTimer  = 700;
      }
    } else if (autoState === 'wait') {
      autoTimer -= 16;
      if (autoTimer <= 0) {
        autoState = 'idle';
        autoTimer = 1400;
      }
    }
  } else {
    if (swingPhase > 0) {
      swingPhase -= 0.008;
      if (swingPhase < 0) swingPhase = 0;
    }
  }
  draw(swingPhase, t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── 按鈕 ──────────────────────────────────
document.getElementById('btnIdle').onclick = () => {
  autoMode = false; swingPhase = 0;
};
document.getElementById('btnSwing').onclick = () => {
  autoMode = false; swingPhase = 0.45;
};
document.getElementById('btnAuto').onclick = () => {
  autoMode   = !autoMode;
  autoState  = 'idle';
  autoTimer  = 800;
  document.getElementById('btnAuto').textContent = autoMode ? '停止自動' : '自動播放';
};
</script>
</body>
</html>
