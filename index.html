<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>路否羅遊戲平台</title>

  <!-- 方法一：HTML meta 重導向（JavaScript 停用時的備援） -->
  <meta http-equiv="refresh" content="0; url=https://island.rexhuang-777.workers.dev/">

  <!-- 方法二：JavaScript 立即轉跳（優先執行） -->
  <script>
    window.location.replace("https://island.rexhuang-777.workers.dev/");
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080c1a;
      color: #eef1f8;
      font-family: 'Noto Sans TC', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 20px;
      padding: 24px;
      text-align: center;
    }

    .emoji {
      font-size: 64px;
      animation: bounce 1.2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    h1 {
      background: linear-gradient(150deg, #FFD166 0%, #FF8C2A 45%, #FF5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #6a7a9a;
      font-size: 15px;
      line-height: 1.6;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255, 140, 42, 0.2);
      border-top-color: #FF8C2A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn {
      display: inline-block;
      color: #FF8C2A;
      text-decoration: none;
      padding: 12px 28px;
      border: 1px solid rgba(255, 140, 42, 0.5);
      border-radius: 28px;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      background: rgba(255, 140, 42, 0.12);
      box-shadow: 0 4px 18px rgba(255, 140, 42, 0.3);
    }
  </style>
</head>
<body>
  <div class="emoji">🦁</div>
  <h1>路否羅遊戲平台</h1>
  <p class="subtitle">正在轉跳到新平台，請稍候…</p>
  <div class="spinner"></div>
  <a class="btn" href="https://island.rexhuang-777.workers.dev/">
    若未自動轉跳，請點此進入 →
  </a>
</body>
</html>
